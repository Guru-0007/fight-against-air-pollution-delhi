<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time air quality monitoring platform for Delhi — track AQI across 15 zones, submit pollution reports, and analyze environmental data.">
  <title>Delhi Air Quality Intelligence</title>

  <!-- Fonts: Inter for clean modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App Styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <!-- Ambient Background -->
  <canvas id="ambient-canvas"></canvas>
  <div class="ambient-gradient" id="ambient-gradient"></div>

  <!-- App Shell -->
  <div id="app" class="app-shell">
    <!-- Navigation -->
    <header class="app-header" id="app-header">
      <div class="header-left">
        <h1 class="logo" id="logo">
          <span class="logo-icon">◉</span>
          Delhi Air Quality
        </h1>
        <span class="live-badge" id="live-badge">
          <span class="live-dot"></span>
          Live
        </span>
      </div>

      <nav id="navbar" class="main-nav"></nav>

      <div class="header-right" id="auth-area"></div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <div class="page-loader">
        <div class="loader-pulse"></div>
        <span>Loading data...</span>
      </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
    <div id="modal-container"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Heat -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Application -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
